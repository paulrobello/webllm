<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebLLM Eval Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #08080A;
  --bg-primary: #0D0D10;
  --bg-card: #141418;
  --bg-card-hover: #1A1A1F;
  --bg-inset: #0F0F13;
  --border-subtle: #222228;
  --border-medium: #2C2C34;
  --border-bright: #3A3A44;

  --text-primary: #E8E8EC;
  --text-secondary: #9898A4;
  --text-muted: #5C5C6A;
  --text-accent: #00D4FF;

  --accent-cyan: #00D4FF;
  --accent-cyan-dim: #00A8CC;
  --accent-cyan-glow: rgba(0, 212, 255, 0.15);
  --accent-cyan-subtle: rgba(0, 212, 255, 0.06);

  --score-excellent: #00FF88;
  --score-good: #7CFF6B;
  --score-fair: #FFB800;
  --score-poor: #FF6B35;
  --score-bad: #FF3355;

  --difficulty-easy: #3B9EFF;
  --difficulty-medium: #C084FC;
  --difficulty-hard: #FF6B6B;

  --font-display: 'JetBrains Mono', monospace;
  --font-body: 'DM Sans', sans-serif;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.08);

  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-med: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 600ms cubic-bezier(0.16, 1, 0.3, 1);
}

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 212, 255, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 255, 136, 0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1360px;
  margin: 0 auto;
  padding: 40px 32px 80px;
}

/* ── Header ── */
.report-header {
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border-subtle);
}

.report-header .topline {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.report-header .logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent-cyan);
  background: var(--accent-cyan-subtle);
  border: 1px solid rgba(0, 212, 255, 0.15);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
}

.report-header h1 {
  font-family: var(--font-display);
  font-size: 1.9rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.report-header .model-name {
  color: var(--accent-cyan);
}

.report-header .meta {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 12px;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-family: var(--font-display);
}

.report-header .meta .sep {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-muted);
}

/* ── Compare Bar ── */
.compare-bar {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.compare-bar label {
  font-size: 0.75rem;
  font-family: var(--font-display);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.compare-bar select,
.compare-bar input[type="file"] {
  font-family: var(--font-display);
  font-size: 0.78rem;
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  outline: none;
  transition: border-color var(--transition-fast);
  cursor: pointer;
}

.compare-bar select:focus,
.compare-bar input[type="file"]:focus {
  border-color: var(--accent-cyan-dim);
}

.compare-bar .compare-label {
  font-size: 0.72rem;
  color: var(--score-fair);
  display: none;
}

.compare-bar .compare-label.visible { display: inline; }

/* ── Summary Cards ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition-fast), transform var(--transition-fast);
}

.summary-card:hover {
  border-color: var(--border-medium);
  transform: translateY(-1px);
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.summary-card.overall::before { background: linear-gradient(90deg, var(--accent-cyan), transparent); }
.summary-card.tasks::before { background: linear-gradient(90deg, var(--score-good), transparent); }
.summary-card.passrate::before { background: linear-gradient(90deg, var(--score-excellent), transparent); }
.summary-card.latency::before { background: linear-gradient(90deg, var(--score-fair), transparent); }

.summary-card .card-label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.summary-card .card-value {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}

.summary-card.overall .card-value { color: var(--accent-cyan); }
.summary-card.tasks .card-value { color: var(--text-primary); }
.summary-card.passrate .card-value { color: var(--score-good); }
.summary-card.latency .card-value { color: var(--score-fair); }

.summary-card .card-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ── Dimension Bars ── */
.dimensions-section {
  margin-bottom: 40px;
}

.dimensions-section .section-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.dimension-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dimension-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 8px 16px;
  transition: border-color var(--transition-fast);
  cursor: pointer;
}

.dimension-card:hover { border-color: var(--border-medium); }

.dimension-card .dim-header {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.dimension-card .dim-name {
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.dimension-card .dim-passed {
  font-family: var(--font-display);
  font-size: 0.72rem;
  color: var(--text-muted);
}

.dimension-card .bar-track {
  height: 8px;
  background: var(--bg-inset);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.dimension-card .bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width var(--transition-slow);
  position: relative;
}

.dimension-card .bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
  border-radius: 0 4px 4px 0;
}

.dimension-card .dim-score {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1;
}

.dimension-card .dim-latency {
  font-family: var(--font-display);
  font-size: 0.72rem;
  color: var(--text-muted);
  text-align: right;
}

/* ── Results Table ── */
.results-section {
  margin-top: 8px;
}

.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-header .section-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
}

.results-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.results-controls label {
  font-family: var(--font-display);
  font-size: 0.68rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.results-controls select,
.results-controls button {
  font-family: var(--font-display);
  font-size: 0.75rem;
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  cursor: pointer;
  transition: border-color var(--transition-fast), background var(--transition-fast);
}

.results-controls select:hover,
.results-controls button:hover {
  border-color: var(--border-medium);
  background: var(--bg-card-hover);
}

.results-controls select:focus,
.results-controls button:focus {
  outline: none;
  border-color: var(--accent-cyan-dim);
}

.results-controls button.active {
  background: var(--accent-cyan-subtle);
  border-color: rgba(0, 212, 255, 0.2);
  color: var(--accent-cyan);
}

.results-table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.results-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.results-table thead th {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-align: left;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  user-select: none;
  transition: color var(--transition-fast);
  white-space: nowrap;
}

.results-table thead th:hover {
  color: var(--text-secondary);
}

.results-table thead th.sorted {
  color: var(--accent-cyan);
}

.results-table thead th .sort-arrow {
  display: inline-block;
  margin-left: 4px;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.results-table thead th.sorted .sort-arrow {
  opacity: 1;
}

.results-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background var(--transition-fast);
}

.results-table tbody tr:hover {
  background: var(--bg-card-hover);
}

.results-table tbody tr:last-child {
  border-bottom: none;
}

.results-table td {
  padding: 11px 16px;
  vertical-align: middle;
  white-space: nowrap;
}

.results-table .col-id {
  font-family: var(--font-display);
  font-weight: 500;
  color: var(--text-primary);
  font-size: 0.78rem;
}

.results-table .col-dim {
  font-family: var(--font-display);
  font-size: 0.72rem;
  color: var(--text-secondary);
}

.results-table .col-difficulty {
  font-family: var(--font-display);
  font-size: 0.68rem;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.results-table .col-difficulty.easy { color: var(--difficulty-easy); background: rgba(59, 158, 255, 0.1); }
.results-table .col-difficulty.medium { color: var(--difficulty-medium); background: rgba(192, 132, 252, 0.1); }
.results-table .col-difficulty.hard { color: var(--difficulty-hard); background: rgba(255, 107, 107, 0.1); }

.score-badge {
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  display: inline-block;
  min-width: 48px;
  text-align: center;
}

.score-badge.excellent { color: var(--score-excellent); background: rgba(0, 255, 136, 0.1); }
.score-badge.good { color: var(--score-good); background: rgba(124, 255, 107, 0.08); }
.score-badge.fair { color: var(--score-fair); background: rgba(255, 184, 0, 0.1); }
.score-badge.poor { color: var(--score-poor); background: rgba(255, 107, 53, 0.1); }
.score-badge.bad { color: var(--score-bad); background: rgba(255, 51, 85, 0.1); }

.results-table .col-latency,
.results-table .col-tps {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.results-table .col-output {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.75rem;
  color: var(--text-muted);
  cursor: pointer;
}

.results-table .col-output:hover {
  color: var(--text-secondary);
}

.results-table .error-cell {
  color: var(--score-bad);
  font-family: var(--font-display);
  font-size: 0.72rem;
}

/* ── Detail Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.modal-overlay.visible {
  display: flex;
}

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-lg);
  max-width: 680px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
}

.modal-content .close-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  transition: color var(--transition-fast);
}

.modal-content .close-btn:hover { color: var(--text-primary); }

.modal-content h3 {
  font-family: var(--font-display);
  font-size: 0.9rem;
  margin-bottom: 16px;
  color: var(--accent-cyan);
}

.modal-content .detail-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 0.82rem;
}

.modal-content .detail-row .label {
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding-top: 2px;
}

.modal-content .detail-row .value {
  color: var(--text-secondary);
  word-break: break-word;
  white-space: pre-wrap;
  background: var(--bg-inset);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-size: 0.75rem;
  line-height: 1.5;
}

/* ── Compare Diff ── */
.compare-section {
  display: none;
  margin-top: 40px;
  padding-top: 32px;
  border-top: 1px solid var(--border-subtle);
}

.compare-section.visible { display: block; }

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.compare-col .compare-model-name {
  font-family: var(--font-display);
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.compare-col .compare-model-name span {
  color: var(--accent-cyan);
}

/* ── Footer ── */
.report-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-display);
  font-size: 0.68rem;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
}

/* ── Animations ── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.summary-card { animation: fadeInUp 0.5s var(--transition-slow) both; }
.summary-card:nth-child(1) { animation-delay: 0.05s; }
.summary-card:nth-child(2) { animation-delay: 0.1s; }
.summary-card:nth-child(3) { animation-delay: 0.15s; }
.summary-card:nth-child(4) { animation-delay: 0.2s; }

.dimension-card { animation: fadeInUp 0.5s var(--transition-slow) 0.25s both; }
.dimension-card:nth-child(2) { animation-delay: 0.3s; }
.dimension-card:nth-child(3) { animation-delay: 0.35s; }
.dimension-card:nth-child(4) { animation-delay: 0.4s; }

.results-section { animation: fadeInUp 0.5s var(--transition-slow) 0.45s both; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .container { padding: 24px 16px 60px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .dimension-grid { grid-template-columns: 1fr; }
  .compare-grid { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
  .summary-grid { grid-template-columns: 1fr; }
  .report-header h1 { font-size: 1.4rem; }
  .results-controls { flex-direction: column; align-items: flex-start; }
  .results-table { font-size: 0.72rem; }
  .results-table td, .results-table th { padding: 8px 10px; }
  .col-output { display: none; }
}

/* ── Print ── */
@media print {
  body::before, body::after { display: none; }
  .container { padding: 0; max-width: 100%; }
  .summary-card, .dimension-card, .results-table-wrap {
    break-inside: avoid;
    border: 1px solid #ddd;
    background: white;
    color: #111;
  }
  .summary-card .card-value { color: #111; }
  .summary-card .card-label, .dimension-card .dim-name { color: #555; }
  .bar-track { border: 1px solid #ddd; }
  .results-controls, .compare-bar, .modal-overlay { display: none !important; }
  .results-table tbody tr { border-bottom-color: #eee; }
  .results-table thead th { color: #555; border-bottom: 2px solid #ddd; }
  .results-table td { color: #333; }
  .score-badge { border: 1px solid currentColor; background: none !important; }
  .report-footer { color: #999; }
}
</style>
</head>
<body>

<div class="container">
  <header class="report-header">
    <div class="topline">
      <span class="logo">WebLLM Eval</span>
    </div>
    <h1 id="report-title">Evaluation Report — <span class="model-name" id="model-name">—</span></h1>
    <div class="meta">
      <span id="report-timestamp">—</span>
      <span class="sep"></span>
      <span id="report-total-meta">—</span>
    </div>
    <div class="compare-bar">
      <label>Compare with</label>
      <input type="file" id="compare-file" accept=".json" />
      <span class="compare-label" id="compare-label">vs <span id="compare-model">—</span></span>
    </div>
  </header>

  <section class="summary-grid">
    <div class="summary-card overall">
      <div class="card-label">Overall Score</div>
      <div class="card-value" id="summary-score">—</div>
      <div class="card-sub" id="summary-score-sub"></div>
    </div>
    <div class="summary-card tasks">
      <div class="card-label">Total Tasks</div>
      <div class="card-value" id="summary-tasks">—</div>
      <div class="card-sub">across all dimensions</div>
    </div>
    <div class="summary-card passrate">
      <div class="card-label">Pass Rate</div>
      <div class="card-value" id="summary-passrate">—</div>
      <div class="card-sub" id="summary-pass-sub"></div>
    </div>
    <div class="summary-card latency">
      <div class="card-label">Avg Latency</div>
      <div class="card-value" id="summary-latency">—</div>
      <div class="card-sub">across all tasks</div>
    </div>
  </section>

  <section class="dimensions-section">
    <div class="section-title">Dimension Scores</div>
    <div class="dimension-grid" id="dimension-grid"></div>
  </section>

  <section class="results-section">
    <div class="results-header">
      <div class="section-title">Task Results</div>
      <div class="results-controls">
        <label>Dimension</label>
        <select id="filter-dimension">
          <option value="all">All</option>
        </select>
        <label>Difficulty</label>
        <select id="filter-difficulty">
          <option value="all">All</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <label>Sort</label>
        <button class="active" data-sort="id">ID ▲</button>
        <button data-sort="score">Score</button>
        <button data-sort="latency">Latency</button>
      </div>
    </div>
    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th class="sorted" data-col="id">Task ID <span class="sort-arrow">▲</span></th>
            <th data-col="dimension">Dimension <span class="sort-arrow">▲</span></th>
            <th data-col="difficulty">Difficulty <span class="sort-arrow">▲</span></th>
            <th data-col="score">Score <span class="sort-arrow">▲</span></th>
            <th data-col="latency">Latency <span class="sort-arrow">▲</span></th>
            <th data-col="tps">Tok/s <span class="sort-arrow">▲</span></th>
            <th>Output</th>
          </tr>
        </thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
  </section>

  <section class="compare-section" id="compare-section">
    <div class="section-title" style="margin-bottom:16px">Comparison</div>
    <div class="compare-grid" id="compare-grid"></div>
  </section>

  <footer class="report-footer">
    <span>WebLLM Eval Report</span>
    <span id="footer-timestamp">—</span>
  </footer>
</div>

<div class="modal-overlay" id="detail-modal">
  <div class="modal-content">
    <button class="close-btn" id="modal-close">&times;</button>
    <h3 id="modal-title">—</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const DIMENSION_LABELS = {
  'tool-calling': 'Tool Calling',
  'reasoning': 'Reasoning',
  'instruction-following': 'Instruction Following',
  'embedding': 'Embedding',
};

function scoreColor(s) {
  if (s >= 0.9) return 'var(--score-excellent)';
  if (s >= 0.7) return 'var(--score-good)';
  if (s >= 0.5) return 'var(--score-fair)';
  if (s >= 0.3) return 'var(--score-poor)';
  return 'var(--score-bad)';
}

function scoreClass(s) {
  if (s >= 0.9) return 'excellent';
  if (s >= 0.7) return 'good';
  if (s >= 0.5) return 'fair';
  if (s >= 0.3) return 'poor';
  return 'bad';
}

let report = null;
let compareReport = null;
let sortCol = 'id';
let sortAsc = true;

function render(data, isCompare) {
  document.getElementById('model-name').textContent = data.modelId;
  document.getElementById('report-timestamp').textContent = new Date(data.timestamp).toLocaleString();
  document.getElementById('report-total-meta').textContent = `${data.totalTasks} tasks`;
  document.getElementById('footer-timestamp').textContent = new Date(data.timestamp).toLocaleString();

  const overall = (data.overall * 100).toFixed(1);
  document.getElementById('summary-score').textContent = `${overall}%`;
  document.getElementById('summary-score-sub').textContent = `Score: ${data.overall.toFixed(2)}`;
  document.getElementById('summary-tasks').textContent = data.totalTasks;

  const totalPassed = Object.values(data.dimensions).reduce((s, d) => s + d.passed, 0);
  const passRate = data.totalTasks > 0 ? ((totalPassed / data.totalTasks) * 100).toFixed(0) : '0';
  document.getElementById('summary-passrate').textContent = `${passRate}%`;
  document.getElementById('summary-pass-sub').textContent = `${totalPassed} of ${data.totalTasks} passed`;

  const avgLat = Object.values(data.dimensions).reduce((s, d) => s + d.avgLatencyMs, 0) / Math.max(Object.keys(data.dimensions).length, 1);
  document.getElementById('summary-latency').textContent = `${Math.round(avgLat)}ms`;

  renderDimensions(data);
  renderFilters(data);
  renderTable(data);

  if (isCompare) return;
}

function renderDimensions(data) {
  const grid = document.getElementById('dimension-grid');
  grid.innerHTML = '';
  const sel = document.getElementById('filter-dimension');
  const resultsSection = document.querySelector('.results-section');

  for (const [dim, info] of Object.entries(data.dimensions)) {
    const pct = (info.score * 100).toFixed(0);
    const color = scoreColor(info.score);
    const label = DIMENSION_LABELS[dim] || dim;

    const card = document.createElement('div');
    card.className = 'dimension-card';
    card.tabIndex = 0;
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', `Show ${label} tasks`);
    card.innerHTML = `
      <div class="dim-header">
        <span class="dim-name">${label}</span>
        <span class="dim-passed">${info.passed}/${info.total} passed</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div>
        <div class="dim-score" style="color:${color}">${pct}%</div>
      </div>
      <div class="dim-latency">${Math.round(info.avgLatencyMs)}ms avg</div>
    `;
    card.addEventListener('click', () => {
      sel.value = dim;
      renderTable(data);
      resultsSection?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    card.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        card.click();
      }
    });
    grid.appendChild(card);
  }
}

function renderFilters(data) {
  const sel = document.getElementById('filter-dimension');
  const existing = new Set([...sel.options].map(o => o.value));
  for (const dim of Object.keys(data.dimensions)) {
    if (!existing.has(dim)) {
      const opt = document.createElement('option');
      opt.value = dim;
      opt.textContent = DIMENSION_LABELS[dim] || dim;
      sel.appendChild(opt);
      existing.add(dim);
    }
  }
}

function renderTable(data) {
  const dimFilter = document.getElementById('filter-dimension').value;
  const diffFilter = document.getElementById('filter-difficulty').value;

  let rows = [...data.results];
  if (dimFilter !== 'all') rows = rows.filter(r => r.dimension === dimFilter);
  if (diffFilter !== 'all') rows = rows.filter(r => r.difficulty === diffFilter);

  rows.sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'id': va = a.taskId; vb = b.taskId; break;
      case 'score': va = a.score; vb = b.score; break;
      case 'latency': va = a.latencyMs; vb = b.latencyMs; break;
      case 'dimension': va = a.dimension; vb = b.dimension; break;
      case 'difficulty': va = a.difficulty; vb = b.difficulty; break;
      case 'tps': va = a.tokensPerSecond; vb = b.tokensPerSecond; break;
      default: va = a.taskId; vb = b.taskId;
    }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const tbody = document.getElementById('results-tbody');
  tbody.innerHTML = '';

  for (const r of rows) {
    const tr = document.createElement('tr');
    const dimLabel = DIMENSION_LABELS[r.dimension] || r.dimension;
    const output = r.modelOutput ? r.modelOutput.substring(0, 80) + (r.modelOutput.length > 80 ? '…' : '') : (r.error || '—');
    const cls = scoreClass(r.score);

    tr.innerHTML = `
      <td class="col-id">${r.taskId}</td>
      <td class="col-dim">${dimLabel}</td>
      <td><span class="col-difficulty ${r.difficulty}">${r.difficulty}</span></td>
      <td><span class="score-badge ${cls}">${r.score.toFixed(2)}</span></td>
      <td class="col-latency">${r.latencyMs}ms</td>
      <td class="col-tps">${r.tokensPerSecond > 0 ? r.tokensPerSecond : '—'}</td>
      <td class="col-output" data-task="${r.taskId}">${output}</td>
    `;
    tbody.appendChild(tr);
  }

  document.querySelectorAll('.col-output').forEach(el => {
    el.addEventListener('click', () => showDetail(el.dataset.task, data));
  });
}

function showDetail(taskId, data) {
  const r = data.results.find(x => x.taskId === taskId);
  if (!r) return;

  const modal = document.getElementById('detail-modal');
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');

  title.textContent = `${r.taskId} — ${DIMENSION_LABELS[r.dimension] || r.dimension}`;
  body.innerHTML = `
    <div class="detail-row"><span class="label">Dimension</span><div class="value">${DIMENSION_LABELS[r.dimension] || r.dimension}</div></div>
    <div class="detail-row"><span class="label">Difficulty</span><div class="value">${r.difficulty}</div></div>
    <div class="detail-row"><span class="label">Score</span><div class="value" style="color:${scoreColor(r.score)}">${r.score.toFixed(2)}</div></div>
    <div class="detail-row"><span class="label">Latency</span><div class="value">${r.latencyMs}ms</div></div>
    <div class="detail-row"><span class="label">Tokens/sec</span><div class="value">${r.tokensPerSecond || '—'}</div></div>
    ${r.error ? `<div class="detail-row"><span class="label">Error</span><div class="value" style="color:var(--score-bad)">${r.error}</div></div>` : ''}
    <div class="detail-row"><span class="label">Model Output</span><div class="value">${r.modelOutput || '—'}</div></div>
    ${r.toolCalls && r.toolCalls.length > 0 ? `<div class="detail-row"><span class="label">Tool Calls</span><div class="value">${JSON.stringify(r.toolCalls, null, 2)}</div></div>` : ''}
  `;

  modal.classList.add('visible');
}

function setupControls(data) {
  document.getElementById('filter-dimension').addEventListener('change', () => renderTable(data));
  document.getElementById('filter-difficulty').addEventListener('change', () => renderTable(data));

  document.querySelectorAll('.results-controls button[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.sort;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }

      document.querySelectorAll('.results-controls button[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.textContent = `${col.charAt(0).toUpperCase() + col.slice(1)} ${sortAsc ? '▲' : '▼'}`;

      document.querySelectorAll('.results-table thead th').forEach(th => {
        th.classList.toggle('sorted', th.dataset.col === col);
      });

      renderTable(data);
    });
  });

  document.querySelectorAll('.results-table thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }

      document.querySelectorAll('.results-table thead th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');

      document.querySelectorAll('.results-controls button[data-sort]').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.sort === col) {
          b.classList.add('active');
          b.textContent = `${col.charAt(0).toUpperCase() + col.slice(1)} ${sortAsc ? '▲' : '▼'}`;
        }
      });

      renderTable(data);
    });
  });

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('detail-modal').classList.remove('visible');
  });

  document.getElementById('detail-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.remove('visible');
    }
  });
}

function loadCompare(data, compareData) {
  compareReport = compareData;
  const section = document.getElementById('compare-section');
  const grid = document.getElementById('compare-grid');
  const label = document.getElementById('compare-label');
  const nameSpan = document.getElementById('compare-model');

  label.classList.add('visible');
  nameSpan.textContent = compareData.modelId;
  section.classList.add('visible');

  grid.innerHTML = '';
  for (const model of [data, compareData]) {
    const col = document.createElement('div');
    col.className = 'compare-col';
    col.innerHTML = `
      <div class="compare-model-name">Model: <span>${model.modelId}</span></div>
      ${Object.entries(model.dimensions).map(([dim, info]) => {
        const pct = (info.score * 100).toFixed(0);
        const color = scoreColor(info.score);
        const label = DIMENSION_LABELS[dim] || dim;
        const diff = compareData.modelId !== model.modelId
          ? '' : '';
        return `
          <div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-family:var(--font-display);font-size:0.72rem;color:var(--text-secondary)">${label}</span>
              <span style="font-family:var(--font-display);font-size:0.72rem;color:${color}">${pct}% (${info.passed}/${info.total})</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
      }).join('')}
    `;
    grid.appendChild(col);
  }
}

function init() {
  // Try loading embedded data first, then fall back to URL param or sample
  const params = new URLSearchParams(window.location.search);
  const jsonParam = params.get('data');

  if (jsonParam) {
    try {
      report = JSON.parse(decodeURIComponent(jsonParam));
    } catch {
      report = null;
    }
  }

  if (!report && window.EVAL_DATA) {
    report = window.EVAL_DATA;
  }

  if (report) {
    render(report, false);
    setupControls(report);
  }

  document.getElementById('compare-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (report) loadCompare(report, data);
      } catch {
        console.error('Invalid JSON comparison file');
      }
    };
    reader.readAsText(file);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
