<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebLLM Chat</title>
<link rel="stylesheet" href="./chat.css">
<!-- UMD vendor bundles must run as classic scripts so they register
     `marked` / `hljs` / `DOMPurify` on globalThis. ES-module `import()`
     of UMD files runs them in module scope and the exports never reach
     the window. DOMPurify must load before the chat module so
     renderMarkdown() can sanitize marked output (SEC-004). -->
<script src="./vendor/purify.min.js"></script>
<script src="./vendor/marked.min.js"></script>
<script src="./vendor/highlight.min.js"></script>
<script src="./vendor/highlight-common.min.js"></script>
<script type="module">
const v = new URLSearchParams(globalThis.location.search).get("v");
const suffix = v ? `?v=${encodeURIComponent(v)}` : "";
const { runChatPage } = await import(`./chat-page.js${suffix}`);
await runChatPage();
</script>
</head>
<body></body>
</html>
