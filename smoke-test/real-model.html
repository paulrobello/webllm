<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebLLM Real Model Test</title>
<style>
:root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; line-height: 1.6; padding: 24px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 20px; margin-bottom: 8px; color: var(--blue); }
.subtitle { color: #8b949e; margin-bottom: 16px; }
#log { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; white-space: pre-wrap; word-break: break-all; min-height: 200px; max-height: 600px; overflow-y: auto; margin-bottom: 16px; }
.step { padding: 2px 0; }
.step.pending { color: #8b949e; }
.step.running { color: var(--yellow); }
.step.pass { color: var(--green); }
.step.fail { color: var(--red); }
.step .label { font-weight: bold; }
.error-detail { padding: 4px 0 2px 16px; color: var(--red); font-size: 12px; }
#chat-container { display: none; margin-top: 16px; }
#chat-output { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; min-height: 200px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }
#chat-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 14px; }
#chat-input:focus { outline: 1px solid var(--blue); }
#chat-btn { background: var(--blue); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; margin-top: 8px; }
#chat-btn:disabled { opacity: 0.5; cursor: default; }
#progress-bar { display: none; width: 100%; height: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
#progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.1s; }
#progress-text { text-align: center; font-size: 11px; line-height: 20px; color: #fff; }
</style>
</head>
<body>
<h1>WebLLM Real Model Test</h1>
<p id="subtitle" class="subtitle">Load model and generate text</p>

<div id="progress-bar"><div id="progress-fill"><span id="progress-text">0%</span></div></div>
<div id="log"></div>

<div id="chat-container">
<div id="chat-output"></div>
<input id="chat-input" type="text" placeholder="Type a message..." disabled>
<button id="chat-btn" disabled>Generate</button>
</div>

<script type="module">
const assetSuffix = window.location.search || "";
const {
    GgufParser, ModelLoader, GgmlWasm, ModelInference, Tokenizer, Sampler,
    detectChatTemplate, encodeChatPrompt
} = await import(`./webllm-bundle.js${assetSuffix}`);

const params = new URLSearchParams(window.location.search);
const DEFAULT_MODEL_ID = "qwen3-0.6b-q4f16";
const DEFAULT_CONTEXT_LENGTH = 4096;
const modelId = params.get('model') || DEFAULT_MODEL_ID;
const requestedContextLength = Number(params.get('ctx') || DEFAULT_CONTEXT_LENGTH);
const MODEL_URL = `./models/${modelId}.gguf`;

const logEl = document.getElementById('log');
const subtitleEl = document.getElementById('subtitle');
const progressEl = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const chatContainer = document.getElementById('chat-container');
const chatOutput = document.getElementById('chat-output');
const chatInput = document.getElementById('chat-input');
const chatBtn = document.getElementById('chat-btn');

function log(cls, msg) {
    const el = document.createElement('div');
    el.className = `step ${cls}`;
    el.textContent = msg;
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct) {
    progressFill.style.width = `${pct}%`;
    progressText.textContent = `${pct.toFixed(0)}%`;
}

function shouldAutoInsertBos(tokenizerConfig) {
    return tokenizerConfig?.addBosToken !== false;
}

function getSmokeChatOptions(parsed, chatTemplate) {
    if (parsed?.hyperparams?.architecture === 'qwen3' && detectChatTemplate(chatTemplate ?? '') === 'chatml') {
        return { enableThinking: false };
    }
    return {};
}

function getSmokeSamplingConfig(parsed, chatTemplate, chatOptions = {}) {
    if (
        parsed?.hyperparams?.architecture === 'qwen3' &&
        detectChatTemplate(chatTemplate ?? '') === 'chatml' &&
        chatOptions.enableThinking === false
    ) {
        return {
            temperature: 0.7,
            topK: 20,
            topP: 0.8,
            repetitionPenalty: 1.1,
            seed: 12345,
        };
    }
    return {
        temperature: 0.7,
        topK: 40,
        topP: 0.95,
        repetitionPenalty: 1.05,
        seed: 12345,
    };
}

function makeSmokeSampler(chatTemplate, chatOptions = {}) {
    return new Sampler(getSmokeSamplingConfig(parsedModel, chatTemplate, chatOptions));
}

function sanitizeDisplayText(text) {
    return text
        .replace(/^\s+/, '')
        .replace(/\n{4,}/g, '\n\n')
        .trimStart();
}

function decodeForDebug(tokenIds, includeSpecialTokens = false) {
    return tokenizer.decode(tokenIds, { includeSpecialTokens });
}

function getForbiddenReentryTokens(parsed) {
    if (parsed?.hyperparams?.architecture !== 'qwen3') return [];
    const chatTemplate = parsed?.tokenizerConfig?.chatTemplate ?? '';
    if (!(detectChatTemplate(chatTemplate) === 'chatml')) return [];
    const imStartId = tokenizer.getId('<|im_start|>');
    return imStartId === undefined ? [] : [imStartId];
}

function getThinkingTokenIds(parsed) {
    if (parsed?.hyperparams?.architecture !== 'qwen3') return null;
    const thinkOpenId = tokenizer.getId('<think>');
    const thinkCloseId = tokenizer.getId('</think>');
    if (thinkOpenId === undefined || thinkCloseId === undefined) return null;
    return { thinkOpenId, thinkCloseId };
}

function getMaskedTokensWhileThinking(parsed) {
    const thinkingTokenIds = getThinkingTokenIds(parsed);
    if (!thinkingTokenIds) return [];
    const imStartId = tokenizer.getId('<|im_start|>');
    const imEndId = tokenizer.getId('<|im_end|>');
    return [thinkingTokenIds.thinkOpenId, imStartId, imEndId].filter((id) => id !== undefined);
}

function getMaskedTokensAfterThinkingUntilAnswer(parsed) {
    const thinkingTokenIds = getThinkingTokenIds(parsed);
    if (!thinkingTokenIds) return [];
    const imStartId = tokenizer.getId('<|im_start|>');
    const imEndId = tokenizer.getId('<|im_end|>');
    const toolCallOpenId = tokenizer.getId('<tool_call>');
    const toolCallCloseId = tokenizer.getId('</tool_call>');
    const toolResponseOpenId = tokenizer.getId('<tool_response>');
    const toolResponseCloseId = tokenizer.getId('</tool_response>');
    return [
        thinkingTokenIds.thinkOpenId,
        imStartId,
        imEndId,
        toolCallOpenId,
        toolCallCloseId,
        toolResponseOpenId,
        toolResponseCloseId,
    ].filter((id) => id !== undefined);
}

function maskTokenLogits(logits, tokenIds) {
    for (const tokenId of tokenIds) {
        if (tokenId >= 0 && tokenId < logits.length) {
            logits[tokenId] = -Infinity;
        }
    }
}

function isVisibleTextToken(tokenId) {
    const token = tokenizer.getToken(tokenId);
    if (!token) return false;
    if (token.attr & (4 | 8)) return false;
    return tokenizer.decode([tokenId]).trim().length > 0;
}

function isWhitespaceOnlyTextToken(tokenId) {
    const token = tokenizer.getToken(tokenId);
    if (!token) return false;
    if (token.attr & (4 | 8)) return false;
    return tokenizer.decode([tokenId]).trim().length === 0;
}

function buildSmokePrompt(userMessage, chatOptions = {}) {
    return {
        mode: 'chat',
        tokens: encodeChatPrompt([{ role: 'user', content: userMessage }], tokenizer, chatOptions),
    };
}

function findSingleTokenProbe(tokenizer, candidates) {
    for (const text of candidates) {
        const ids = tokenizer.encode(text);
        if (ids.length === 1) return { text, ids };
    }
    return null;
}

let inference = null;
let tokenizer = null;
let wasm = null;
let parsedModel = null;
let interactiveRunCompletion = null;

async function loadAndTest() {
    const t0 = performance.now();
    const profileMode = new URLSearchParams(window.location.search).has('profile');

    // Step 1: Fetch model
    log('running', '[1/7] Fetching model...');
    progressEl.style.display = 'block';
    let modelBuffer;
    try {
        const resp = await fetch(MODEL_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const total = Number(resp.headers.get('content-length') || 0);
        const reader = resp.body.getReader();
        const chunks = [];
        let received = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total > 0) setProgress((received / total) * 30);
        }
        modelBuffer = new Uint8Array(received);
        let off = 0;
        for (const chunk of chunks) {
            modelBuffer.set(chunk, off);
            off += chunk.length;
        }
        modelBuffer = modelBuffer.buffer;
        log('pass', `[1/7] Model fetched: ${(received / 1e6).toFixed(1)} MB in ${((performance.now() - t0) / 1000).toFixed(1)}s`);
    } catch (e) {
        log('fail', `[1/7] Fetch failed: ${e.message}`);
        return;
    }

    // Step 2: Parse GGUF
    log('running', '[2/7] Parsing GGUF...');
    let ggufCtx, parsed;
    try {
        ggufCtx = GgufParser.parse(modelBuffer);
        parsed = ModelLoader.parseModel(modelBuffer);
        parsedModel = parsed;
        const hp = parsed.hyperparams;
        const subtitleContextLength = requestedContextLength > 0
            ? Math.min(parsed.kvCacheConfig.maxContextLength, requestedContextLength)
            : parsed.kvCacheConfig.maxContextLength;
        subtitleEl.textContent = `Model: ${modelId} · arch=${hp.architecture} · ctx=${subtitleContextLength}`;
        log('pass', `[2/7] GGUF parsed: arch=${hp.architecture} emb=${hp.embeddingLength} heads=${hp.headCount}/${hp.headCountKv} layers=${hp.layerCount} vocab=${hp.vocabularySize} ctx=${hp.contextLength}`);
    } catch (e) {
        log('fail', `[2/7] Parse failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Step 3: Init WASM
    log('running', '[3/7] Initializing WebGPU backend...');
    try {
        wasm = new GgmlWasm();
        await wasm.init({ wasmUrl: `./webllm-wasm.js${assetSuffix}` });
        log('pass', '[3/7] WebGPU backend initialized');
    } catch (e) {
        log('fail', `[3/7] Init failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Step 4: Load weights
    log('running', '[4/7] Loading weights into GPU...');
    setProgress(35);
    try {
        inference = new ModelInference(wasm, parsed.hyperparams);
        if (profileMode) {
            inference.traceEnabled = true;
            window.__decodeTraces = [];
        }
        const t1 = performance.now();
        inference.loadWeights(ggufCtx, modelBuffer);
        const weightTime = ((performance.now() - t1) / 1000).toFixed(1);
        log('pass', `[4/7] Weights loaded in ${weightTime}s`);
        setProgress(80);
    } catch (e) {
        log('fail', `[4/7] Weight load failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Step 5: Init KV cache
    log('running', '[5/7] Initializing KV cache...');
    try {
        const kvContextLength = requestedContextLength > 0
            ? Math.min(parsed.kvCacheConfig.maxContextLength, requestedContextLength)
            : parsed.kvCacheConfig.maxContextLength;
        await inference.initKVCache(kvContextLength);
        log('pass', `[5/7] KV cache: ${kvContextLength} slots x ${parsed.hyperparams.layerCount} layers`);
        setProgress(85);
    } catch (e) {
        log('fail', `[5/7] KV cache failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Step 6: Create tokenizer
    log('running', '[6/7] Creating tokenizer...');
    try {
        tokenizer = new Tokenizer(parsed.tokenizerConfig);
        const testEncode = tokenizer.encode("hello");
        log('pass', `[6/7] Tokenizer ready: vocab=${tokenizer.vocabSize}, encode("hello")=[${testEncode}]`);
        // Expose for console probing
        window.inference = inference;
        window.tokenizer = tokenizer;
        window.parsedModel = parsed;
    } catch (e) {
        log('fail', `[6/7] Tokenizer failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Step 7-norm: probe F32 norm weights — if these are zeros or garbage,
    // the F32 upload path is broken (all prior tensors were quantized).
    log('running', '[7-norm] F32 norm weight probe...');
    try {
        const attn = await inference.debugReadNormWeight('attn0', 8);
        const ffn = await inference.debugReadNormWeight('ffn0', 8);
        const out = await inference.debugReadNormWeight('output', 8);
        log('running', `  blk.0.attn_norm first8: [${Array.from(attn).map(v=>v.toFixed(4)).join(',')}]`);
        log('running', `  blk.0.ffn_norm  first8: [${Array.from(ffn).map(v=>v.toFixed(4)).join(',')}]`);
        log('running', `  output_norm     first8: [${Array.from(out).map(v=>v.toFixed(4)).join(',')}]`);
    } catch (e) {
        log('fail', `[7-norm] failed: ${e.message}`);
    }

    // Step 7-debug: probe kv.k[layer=0] after a prefill to see whether
    // K writes are persisting to the cache at all.
    log('running', '[7-debug] KV write probe...');
    try {
        inference.resetKVCache();
        const probeTokens = tokenizer.encode("hello");
        await inference.forward(new Int32Array(probeTokens), new Int32Array(probeTokens.map((_,i)=>i)));
        const k0 = await inference.debugReadKCache(0, 64 * 4, 0);
        const nzK = Array.from(k0).filter(v => Math.abs(v) > 1e-9).length;
        const sumAbsK = Array.from(k0).reduce((s,v)=>s+Math.abs(v), 0);
        log('running', `  kv.k[layer=0][pos=0][head=0] nonzero=${nzK}/64 sumAbs=${sumAbsK.toFixed(4)}`);
        // V cache layout is [maxCtx, headDim, nKvHeads]. Read V[pos=0, :, head=0]
        // which is `headDim` floats starting at byte offset 0, each stride nb[0]=maxCtx*4=8192.
        // Simpler to read with a stride: dump raw first 64 F32 = V[pos=0..63, dim=0, head=0] (first 64 positions along dim 0).
        const v0 = await inference.debugReadVCache(0, 64 * 4, 0);
        const nzV = Array.from(v0).filter(v => Math.abs(v) > 1e-9).length;
        const sumAbsV = Array.from(v0).reduce((s,v)=>s+Math.abs(v), 0);
        log('running', `  kv.v[layer=0][pos=0..63][dim=0][head=0] nonzero=${nzV}/64 sumAbs=${sumAbsV.toFixed(4)} first4=[${Array.from(v0.slice(0,4)).map(v=>v.toFixed(4)).join(',')}]`);
    } catch (e) {
        log('fail', `[7-debug] KV probe failed: ${e.message}\n${e.stack || ''}`);
    }

    // Step 7-sanity: check a single-token continuation from the model's natural
    // prompt start. Models that disable auto-BOS should not be forced through a BOS-only probe.
    log('running', '[7-sanity] single-token continuation...');
    try {
        inference.resetKVCache();
        const sanityText = shouldAutoInsertBos(parsed.tokenizerConfig) ? "The" : "Hello";
        const sanityIds = tokenizer.encode(sanityText);
        const sanityTokens = shouldAutoInsertBos(parsed.tokenizerConfig)
            ? [tokenizer.bosId, ...sanityIds]
            : sanityIds;
        const logits = await inference.forward(
            new Int32Array(sanityTokens),
            new Int32Array(sanityTokens.map((_, i) => i)),
        );
        const arr = Array.from(logits).map((v, i) => [i, v]);
        arr.sort((a, b) => b[1] - a[1]);
        const top5 = arr.slice(0, 5).map(([id, v]) => {
            const t = tokenizer.getToken(id);
            return `${id}:"${t ? t.text : "?"}"(${v.toFixed(2)})`;
        });
        log('running', `  ${JSON.stringify(sanityText)} → ${top5.join(", ")}`);
    } catch (e) {
        log('fail', `[7-sanity] failed: ${e.message}`);
    }

    // Step 7a: KV-history differential diagnostic.
    // Run the SAME probe token after two DIFFERENT prefixes. If the decode
    // logits are (nearly) identical, attention is ignoring KV history.
    log('running', '[7a] KV history differential...');
    try {
        const probeInfo = findSingleTokenProbe(tokenizer, ['?', '.', '!', ' a', ' I']);
        const prefixAInfo = findSingleTokenProbe(tokenizer, ['hello', 'Hello', 'The']);
        const prefixBInfo = findSingleTokenProbe(tokenizer, ['world', 'time', 'story']);
        if (!probeInfo || !prefixAInfo || !prefixBInfo) {
            throw new Error('could not find single-token probes for this tokenizer');
        }

        const probe = probeInfo.ids;
        const prefixA = prefixAInfo.ids;
        const prefixB = prefixBInfo.ids;

        async function logitsAfterPrefix(prefix) {
            inference.resetKVCache();
            await inference.forward(new Int32Array(prefix), new Int32Array(prefix.map((_,i)=>i)));
            const decodeLogits = await inference.forward(
                new Int32Array(probe),
                new Int32Array([prefix.length]),
            );
            return decodeLogits;
        }

        const lA = await logitsAfterPrefix(prefixA);
        const lB = await logitsAfterPrefix(prefixB);

        let diffCount = 0, maxAbsDiff = 0;
        for (let i = 0; i < lA.length; i++) {
            const d = Math.abs(lA[i] - lB[i]);
            if (d > 1e-5) diffCount++;
            if (d > maxAbsDiff) maxAbsDiff = d;
        }
        const topA = Array.from(lA).reduce((m,v,i,a)=>a[m]>=v?m:i, 0);
        const topB = Array.from(lB).reduce((m,v,i,a)=>a[m]>=v?m:i, 0);
        const verdict = diffCount > 100 ? 'HISTORY MATTERS' : 'HISTORY IGNORED';
        log('running', `  probe=${JSON.stringify(probeInfo.text)} [${probe}] prefixA=${JSON.stringify(prefixAInfo.text)} prefixB=${JSON.stringify(prefixBInfo.text)}`);
        log('running', `  diff logits=${diffCount}/${lA.length}, maxAbsDiff=${maxAbsDiff.toExponential(3)}`);
        log('running', `  topA=${topA} (${lA[topA].toFixed(3)})  topB=${topB} (${lB[topB].toFixed(3)})  => ${verdict}`);

        inference.resetKVCache();
    } catch (e) {
        log('fail', `[7a] KV diagnostic failed: ${e.message}\n${e.stack || ''}`);
    }

    // Step 7: Generate text
    log('running', '[7/7] Generating text...');
    setProgress(90);
    try {
        // Probe a few prompts so we can spot whether outputs are sensible. For
        // each, run a single prefill and log top-5.
        for (const p of ["The", "The quick brown", "Hello, how are you"]) {
            inference.resetKVCache();
            const tks = shouldAutoInsertBos(parsed.tokenizerConfig)
                ? [tokenizer.bosId, ...tokenizer.encode(p)]
                : tokenizer.encode(p);
            const lgts = await inference.forward(
                new Int32Array(tks),
                new Int32Array(tks.map((_, i) => i)),
            );
            const arr = Array.from(lgts).map((v, i) => [i, v]);
            arr.sort((a, b) => b[1] - a[1]);
            const top = arr.slice(0, 5).map(([id, v]) => {
                const t = tokenizer.getToken(id);
                return `${id}:"${t ? t.text : "?"}"(${v.toFixed(2)})`;
            });
            log('running', `  ${JSON.stringify(p)} → ${top.join(", ")}`);
        }
        inference.resetKVCache();

        const userMessage = "Tell one short joke.";
        const chatTmpl = parsed.tokenizerConfig.chatTemplate;
        const smokeChatOptions = getSmokeChatOptions(parsed, chatTmpl);
        const smokePrompt = buildSmokePrompt(userMessage, smokeChatOptions);
        const tokens = smokePrompt.tokens;

        async function compareBatchVsSequentialPrefill(label, promptTokens) {
            inference.resetKVCache();
            const batchLogits = await inference.forward(
                new Int32Array(promptTokens),
                new Int32Array(promptTokens.map((_, i) => i)),
            );

            inference.resetKVCache();
            let seqLogits = null;
            for (let i = 0; i < promptTokens.length; i++) {
                seqLogits = await inference.forward(
                    new Int32Array([promptTokens[i]]),
                    new Int32Array([i]),
                );
            }

            if (!seqLogits) {
                throw new Error(`no sequential logits for ${label}`);
            }

            let diffCount = 0;
            let maxAbsDiff = 0;
            let sumAbsDiff = 0;
            for (let i = 0; i < batchLogits.length; i++) {
                const d = Math.abs(batchLogits[i] - seqLogits[i]);
                if (d > 1e-5) diffCount++;
                if (d > maxAbsDiff) maxAbsDiff = d;
                sumAbsDiff += d;
            }

            const topBatch = Array.from(batchLogits)
                .map((v, i) => [i, v])
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5)
                .map(([id, v]) => {
                    const t = tokenizer.getToken(id);
                    return `${id}:"${t ? t.text : "?"}"(${v.toFixed(2)})`;
                });
            const topSeq = Array.from(seqLogits)
                .map((v, i) => [i, v])
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5)
                .map(([id, v]) => {
                    const t = tokenizer.getToken(id);
                    return `${id}:"${t ? t.text : "?"}"(${v.toFixed(2)})`;
                });

            log(
                'running',
                `  ${label} batch-vs-seq diff=${diffCount}/${batchLogits.length} maxAbs=${maxAbsDiff.toExponential(3)} meanAbs=${(sumAbsDiff / batchLogits.length).toExponential(3)}`,
            );
            log('running', `  ${label} batch top5: ${topBatch.join(", ")}`);
            log('running', `  ${label} seq   top5: ${topSeq.join(", ")}`);
            inference.resetKVCache();
        }

        await compareBatchVsSequentialPrefill(smokePrompt.mode, tokens);

        async function runCompletion(label, promptTokens, sampler, maxGen = 64, chatOptions = {}) {
            const tStart = performance.now();
            const logits = await inference.forward(
                new Int32Array(promptTokens),
                new Int32Array(promptTokens.map((_, i) => i)),
            );
            const prefillMs = performance.now() - tStart;
            const forbiddenReentryTokens = new Set(getForbiddenReentryTokens(parsed));
            const thinkingTokenIds = getThinkingTokenIds(parsed);
            const maskedTokensWhileThinking = getMaskedTokensWhileThinking(parsed);
            const maskedTokensAfterThinkingUntilAnswer = getMaskedTokensAfterThinkingUntilAnswer(parsed);
            const requireVisibleAnswerAfterThinking = thinkingTokenIds !== null;
            let thinkDepth = 0;
            let hasVisibleAnswerText = false;
            let waitingForVisibleAnswer = false;

            log('running', `  ${label} prompt tokens: ${promptTokens.length}`);
            {
                const arr = Array.from(logits).map((v, i) => [i, v]);
                arr.sort((a, b) => b[1] - a[1]);
                const top = arr.slice(0, 10).map(([id, v]) => {
                    const t = tokenizer.getToken(id);
                    return `${id}:"${t ? t.text : "?"}"(${v.toFixed(2)})`;
                });
                log('running', `  ${label} prefill top10: ${top.join(", ")}`);
            }

            const eosId = parsed.tokenizerConfig.eosTokenId;
            const generated = [];
            const recent = [...promptTokens];
            let finishReason = 'max-tokens';
            sampler.applyRepetitionPenalty(logits, recent.slice(-64));
            let sampledId = sampler.sample(logits);
            if (thinkingTokenIds && sampledId === thinkingTokenIds.thinkOpenId) {
                thinkDepth = 1;
            } else if (thinkingTokenIds && sampledId === thinkingTokenIds.thinkCloseId) {
                return {
                    outputText: '',
                    rawOutputText: '',
                    displayOutputText: '',
                    genTokens: 0,
                    finishReason: 'stop-token',
                    prefillMs,
                    genTime: performance.now() - tStart - prefillMs,
                    totalTime: performance.now() - tStart,
                };
            }
            generated.push(sampledId);
            recent.push(sampledId);

            for (let step = 0; step < maxGen; step++) {
                if (sampledId === eosId) {
                    finishReason = 'eos';
                    break;
                }
                const pos = promptTokens.length + step;
                if (sampler.isGreedy && sampler.noPenalty) {
                    const result = await inference.forwardDecode(
                        new Int32Array([sampledId]),
                        new Int32Array([pos]),
                        'greedy',
                    );
                    if (profileMode && inference.lastTrace) {
                        window.__decodeTraces.push({ ...inference.lastTrace });
                    }
                    sampledId = result.tokenId;
                } else {
                    const stepLogits = await inference.forward(
                        new Int32Array([sampledId]),
                        new Int32Array([pos]),
                    );
                    if (profileMode && inference.lastTrace) {
                        window.__decodeTraces.push({ ...inference.lastTrace });
                    }
                    sampler.applyRepetitionPenalty(stepLogits, recent.slice(-64));
                    if (thinkDepth > 0) {
                        maskTokenLogits(stepLogits, maskedTokensWhileThinking);
                    } else if (waitingForVisibleAnswer) {
                        maskTokenLogits(stepLogits, maskedTokensAfterThinkingUntilAnswer);
                        if (requireVisibleAnswerAfterThinking) {
                            maskTokenLogits(stepLogits, [eosId]);
                        }
                    } else if (hasVisibleAnswerText) {
                        maskTokenLogits(stepLogits, maskedTokensAfterThinkingUntilAnswer);
                    }
                    sampledId = sampler.sample(stepLogits);
                    if (waitingForVisibleAnswer) {
                        const maskedWhitespaceOnly = new Set();
                        while (
                            isWhitespaceOnlyTextToken(sampledId) &&
                            !maskedWhitespaceOnly.has(sampledId)
                        ) {
                            maskedWhitespaceOnly.add(sampledId);
                            maskTokenLogits(stepLogits, [sampledId]);
                            sampledId = sampler.sample(stepLogits);
                        }
                    }
                }
                if (sampledId === eosId) {
                    finishReason = 'eos';
                    break;
                }
                if (thinkingTokenIds && sampledId === thinkingTokenIds.thinkOpenId) {
                    if (thinkDepth > 0) {
                        finishReason = 'stop-token';
                        break;
                    }
                    thinkDepth++;
                } else if (thinkingTokenIds && sampledId === thinkingTokenIds.thinkCloseId) {
                    if (thinkDepth === 0) {
                        finishReason = 'stop-token';
                        break;
                    }
                    thinkDepth = Math.max(0, thinkDepth - 1);
                    if (thinkDepth === 0) {
                        waitingForVisibleAnswer = requireVisibleAnswerAfterThinking;
                    }
                }
                if (waitingForVisibleAnswer && !hasVisibleAnswerText && isVisibleTextToken(sampledId)) {
                    hasVisibleAnswerText = true;
                    waitingForVisibleAnswer = false;
                }
                if (generated.length >= 1 && forbiddenReentryTokens.has(sampledId)) {
                    finishReason = 'stop-token';
                    break;
                }
                generated.push(sampledId);
                recent.push(sampledId);
            }

            const totalTime = performance.now() - tStart;
            const outputText = decodeForDebug(generated);
            const rawOutputText = decodeForDebug(generated, true);
            return {
                outputText,
                rawOutputText,
                displayOutputText: sanitizeDisplayText(outputText),
                genTokens: generated.length,
                finishReason,
                prefillMs,
                genTime: totalTime - prefillMs,
                totalTime,
            };
        }
        interactiveRunCompletion = runCompletion;

        const smokeSampler = makeSmokeSampler(chatTmpl, smokeChatOptions);
        const smokeResult = await runCompletion(smokePrompt.mode, tokens, smokeSampler, 64, smokeChatOptions);

        log('pass', `[7/7] Generated ${smokeResult.genTokens} tokens in ${(smokeResult.totalTime / 1000).toFixed(1)}s (prefill: ${smokeResult.prefillMs.toFixed(0)}ms, decode: ${smokeResult.genTime.toFixed(0)}ms, ${(smokeResult.genTokens / (smokeResult.genTime / 1000)).toFixed(1)} tok/s, finish=${smokeResult.finishReason})`);
        log('pass', `User: ${userMessage}`);
        log('pass', `Assistant: ${smokeResult.displayOutputText || smokeResult.outputText}`);

        setProgress(100);
    } catch (e) {
        log('fail', `[7/7] Generation failed: ${e.message}\n${e.stack || ''}`);
        return;
    }

    // Show chat interface
    chatContainer.style.display = 'block';
    chatInput.disabled = false;
    chatBtn.disabled = false;
    chatInput.focus();
}

// Chat handler
chatBtn.addEventListener('click', runChat);
chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !chatBtn.disabled) runChat();
});

async function runChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatBtn.disabled = true;
    chatInput.disabled = true;
    chatOutput.textContent += `User: ${text}\nAssistant: `;

    try {
        const chatTmpl = parsedModel?.tokenizerConfig?.chatTemplate;
        const chatOptions = getSmokeChatOptions(parsedModel, chatTmpl);
        const sampler = makeSmokeSampler(chatTmpl, chatOptions);

        if (!window._chatSession) {
            window._chatSession = { position: 0, history: [], messages: [], prevCount: 0 };
        }
        const sess = window._chatSession;
        const userContent =
            text;
        sess.messages.push({ role: 'user', content: userContent });
        const promptTokens = encodeChatPrompt(sess.messages, tokenizer, chatOptions);
        inference.resetKVCache();
        sess.position = 0;
        sess.history = [];
        sess.prevCount = sess.messages.length;
        if (typeof interactiveRunCompletion !== 'function') {
            throw new Error('interactive completion helper not ready');
        }

        const result = await interactiveRunCompletion(
            'chat-interactive',
            promptTokens,
            sampler,
            100,
            chatOptions,
        );
        const fullText = result.displayOutputText || result.outputText;
        chatOutput.textContent = chatOutput.textContent.replace(
            /Assistant: [\s\S]*$/,
            'Assistant: ' + fullText,
        );
        sess.messages.push({ role: 'assistant', content: fullText });

        const elapsed = (result.totalTime / 1000).toFixed(2);
        const tps = result.genTime > 0
            ? (result.genTokens / (result.genTime / 1000)).toFixed(1)
            : '0.0';
        chatOutput.textContent += `\n(${result.genTokens} tokens, ${tps} tok/s, ${elapsed}s, finish=${result.finishReason})\n\n`;
    } catch (e) {
        chatOutput.textContent += `[Error: ${e.message}]\n\n`;
    }

    chatBtn.disabled = false;
    chatInput.disabled = false;
    chatInput.value = '';
    chatInput.focus();
}

loadAndTest();
</script>
