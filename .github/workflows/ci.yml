name: ci

on:
  push:
    branches: [main]
  pull_request:

# Ship gate: fmt + lint + typecheck (src + tests) + test. Browser/WASM
# benches (wasm-build, smoke-*, anything needing Chrome/emsdk) stay local —
# they are not reproducible in a stock ubuntu runner and `build-package.ts`
# deliberately fails fast without WASM artifacts. Publishing is user-gated
# (CI/CD only) per project policy and is intentionally NOT wired here.
#
# Follow-up (when publishing is unblocked): add a tag-triggered `publish`
# job gated on this `checkall` job:
#
#   publish:
#     needs: checkall
#     if: startsWith(github.ref, 'refs/tags/v')
#     runs-on: ubuntu-latest
#     permissions:
#       contents: read
#       id-token: write
#     steps:
#       - uses: actions/checkout@v7.0.0
#       - uses: oven-sh/setup-bun@v2.2.0
#         with:
#           bun-version: 1.3.14
#       - run: bun install --frozen-lockfile
#       # publish goes through CI/CD only — never run make publish locally.

jobs:
  checkall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: make checkall
